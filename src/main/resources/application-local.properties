# Perfil opcional: roda sem PostgreSQL (banco em memória).
# Uso: mvn spring-boot:run -Dspring-boot.run.profiles=local
server.port=${SERVER_PORT:9090}
spring.datasource.url=jdbc:h2:mem:despesas_receitas;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# E-mail desligado por padrão no perfil local (ligue com APP_EMAIL_ENABLED=true se testar SMTP)
app.email.enabled=${APP_EMAIL_ENABLED:false}

logging.level.com.univates.despesasreceitas.service.EmailService=DEBUG
