# Requer variáveis de ambiente DB_URL, DB_USER e DB_PASSWORD (sem valores padrão).
# Desenvolvimento sem PostgreSQL: perfil local (H2 em memória):
#   mvn spring-boot:run -Dspring-boot.run.profiles=local
# Docker: defina as variáveis (ex.: via .env a partir de .env.example) e suba com compose.
server.port=${SERVER_PORT:8080}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.show-sql=true
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- E-mail (mensageria) ---
# Padrão: desligado. Não commite senhas — use variáveis de ambiente (ex.: APP_EMAIL_SMTP_PASSWORD).
# Compose: copie .env.example para .env e preencha os valores sensíveis.
app.email.enabled=${APP_EMAIL_ENABLED:false}
app.email.destinatario=${APP_EMAIL_DESTINATARIO:admin@email.com}
app.email.remetente=${APP_EMAIL_REMETENTE:}
app.email.smtp.host=${APP_EMAIL_SMTP_HOST:}
app.email.smtp.port=${APP_EMAIL_SMTP_PORT:587}
app.email.smtp.username=${APP_EMAIL_SMTP_USERNAME:}
app.email.smtp.password=${APP_EMAIL_SMTP_PASSWORD:}
app.email.smtp.auth=${APP_EMAIL_SMTP_AUTH:true}
app.email.smtp.starttls=${APP_EMAIL_SMTP_STARTTLS:true}
app.email.smtp.debug=${APP_EMAIL_SMTP_DEBUG:false}

logging.level.com.univates.despesasreceitas.service.EmailService=INFO

# --- Actuator / Health ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# --- Painel de ambientes / Ansible ---
# Para executar dentro de container, instale o Ansible na imagem e monte as chaves SSH necessarias.
app.deploy.ansible.enabled=${APP_DEPLOY_ANSIBLE_ENABLED:true}
app.deploy.ansible.executable=${APP_DEPLOY_ANSIBLE_EXECUTABLE:ansible-playbook}
app.deploy.ansible.working-directory=${APP_DEPLOY_ANSIBLE_WORKDIR:.}
app.deploy.ansible.inventory=${APP_DEPLOY_ANSIBLE_INVENTORY:ansible/inventory/hosts.yml}
app.deploy.ansible.deploy-playbook=${APP_DEPLOY_ANSIBLE_DEPLOY_PLAYBOOK:ansible/playbooks/deploy.yml}
app.deploy.ansible.stop-playbook=${APP_DEPLOY_ANSIBLE_STOP_PLAYBOOK:ansible/playbooks/stop.yml}
app.deploy.ansible.status-playbook=${APP_DEPLOY_ANSIBLE_STATUS_PLAYBOOK:ansible/playbooks/status.yml}
app.deploy.ansible.timeout-seconds=${APP_DEPLOY_ANSIBLE_TIMEOUT_SECONDS:600}
