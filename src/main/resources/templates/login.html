<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — Despesas & Receitas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h1>💰 Despesas & Receitas</h1>
            <p>Faça login para continuar</p>
        </div>
        <div th:if="${param.erro}" class="alert alert-erro">
            Usuário ou senha inválidos.
        </div>
        <div th:if="${param.logout}" class="alert alert-sucesso">
            Logout realizado com sucesso.
        </div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" name="username" placeholder="Digite seu login" required autofocus>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>
    </div>
    <p class="login-footer">Univates — GCS 2026/A</p>
</div>
</body>
</html>
