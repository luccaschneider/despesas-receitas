<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lançamento — Despesas & Receitas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div class="header-content">
        <h1>💰 Despesas & Receitas</h1>
        <p>Gerenciamento Financeiro Pessoal</p>
    </div>
</header>
<main class="container">
    <div class="form-card">
        <h2 th:text="${lancamento.id == null} ? 'Novo Lançamento' : 'Editar Lançamento'">Lançamento</h2>

        <form th:action="${lancamento.id == null} ? @{/salvar} : @{/atualizar/{id}(id=${lancamento.id})}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-row">
                <div class="form-group">
                    <label>Descrição *</label>
                    <input type="text" name="descricao" th:value="${lancamento.descricao}"
                           placeholder="Ex: Salário, Aluguel..." required maxlength="200">
                </div>
            </div>
            <div class="form-row three-cols">
                <div class="form-group">
                    <label>Data *</label>
                    <input type="date" name="dataLancamento"
                           th:value="${lancamento.dataLancamento}" required>
                </div>
                <div class="form-group">
                    <label>Valor *</label>
                    <input type="number" name="valor" step="0.01" min="0"
                           th:value="${lancamento.valor}" placeholder="0,00" required>
                </div>
                <div class="form-group">
                    <label>Tipo *</label>
                    <select name="tipoLancamento" required>
                        <option value="">Selecione...</option>
                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"
                                th:selected="${lancamento.tipoLancamento == t}"></option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Situação *</label>
                    <select name="situacao" required>
                        <option value="">Selecione...</option>
                        <option th:each="s : ${situacoes}" th:value="${s}" th:text="${s}"
                                th:selected="${lancamento.situacao == s}"></option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <a href="/" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">
                    <span th:text="${lancamento.id == null} ? 'Salvar' : 'Atualizar'">Salvar</span>
                </button>
            </div>
        </form>
    </div>
</main>
<footer><p>Univates — GCS 2026/A</p></footer>
</body>
</html>
