services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-despesas_receitas}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SERVER_PORT:-8080}/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-homolog}
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_EMAIL_ENABLED: ${APP_EMAIL_ENABLED:-false}
      APP_EMAIL_DESTINATARIO: ${APP_EMAIL_DESTINATARIO:-}
      APP_EMAIL_REMETENTE: ${APP_EMAIL_REMETENTE:-}
      APP_EMAIL_SMTP_HOST: ${APP_EMAIL_SMTP_HOST:-}
      APP_EMAIL_SMTP_PORT: ${APP_EMAIL_SMTP_PORT:-587}
      APP_EMAIL_SMTP_USERNAME: ${APP_EMAIL_SMTP_USERNAME:-}
      APP_EMAIL_SMTP_PASSWORD: ${APP_EMAIL_SMTP_PASSWORD:-}
      APP_EMAIL_SMTP_AUTH: ${APP_EMAIL_SMTP_AUTH:-true}
      APP_EMAIL_SMTP_STARTTLS: ${APP_EMAIL_SMTP_STARTTLS:-true}
      APP_EMAIL_SMTP_DEBUG: ${APP_EMAIL_SMTP_DEBUG:-false}

volumes:
  pgdata:
