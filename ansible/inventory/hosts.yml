---
# Inventario padrao: deploy na propria VM (bootstrap, deploy_*.sh e painel na VM).
# Cada ambiente tem um host proprio para evitar conflito de group_vars (ex.: app_dir).
# Para dev local com tunel SSH, use inventory/hosts-dev.yml
all:
  children:
    homolog:
      hosts:
        homolog-vm:
          ansible_connection: local
    prod:
      hosts:
        prod-vm:
          ansible_connection: local
